[project]
name = "agent"
version = "0.0.1"
description = "Agent for the uv monorepo example"
requires-python = ">=3.11"
dependencies = [
    "langgraph>=0.6.0,<2",
    "langchain-core>=0.2.14",
    "shared",
]

[build-system]
requires = ["setuptools>=73.0.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["agent"]

[tool.setuptools.package-dir]
"agent" = "src/agent"
