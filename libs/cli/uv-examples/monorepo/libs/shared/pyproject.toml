[project]
name = "shared"
version = "0.0.1"
description = "Shared utilities for the uv monorepo example"
requires-python = ">=3.11"
dependencies = []

[build-system]
requires = ["setuptools>=73.0.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["shared"]

[tool.setuptools.package-dir]
"shared" = "src/shared"
